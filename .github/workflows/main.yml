name: Build ShadowHook

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android NDK
      uses: android-actions/setup-android@v3

    - name: Build Libraries
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Pack Binaries
      run: |
        mkdir -p output/libs/arm64-v8a output/libs/armeabi-v7a output/include
        
        # Копируем заголовочный файл
        find . -name "shadowhook.h" -exec cp {} output/include/ \;
        
        # Копируем динамические библиотеки .so из собранного Prefab
        find . -name "libshadowhook.so" -path "*/arm64-v8a/*" -exec cp {} output/libs/arm64-v8a/ \;
        find . -name "libshadowhook.so" -path "*/armeabi-v7a/*" -exec cp {} output/libs/armeabi-v7a/ \;

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: shadowhook-libs
        path: output/
