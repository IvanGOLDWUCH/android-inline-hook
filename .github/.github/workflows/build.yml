name: Build ShadowHook Binaries

on:
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android NDK
      uses: android-actions/setup-android@v3

    - name: Build with Gradle
      run: |
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Find and Package Static Libraries
      run: |
        mkdir -p output/libs/arm64-v8a output/libs/armeabi-v7a output/include
        # Копируем заголовочный файл
        cp shadowhook/src/main/cpp/shadowhook.h output/include/
        # Ищем скомпилированные .a файлы в недрах сборки CMake и копируем их
        find . -name "libshadowhook.a" -path "*/arm64-v8a/*" -exec cp {} output/libs/arm64-v8a/ \;
        find . -name "libshadowhook.a" -path "*/armeabi-v7a/*" -exec cp {} output/libs/armeabi-v7a/ \;

    - name: Upload Finished Binaries
      uses: actions/upload-artifact@v4
      with:
        name: shadowhook-android-libs
        path: output/

